---
# APT (Debian/Ubuntu) defaults
apt_keyrings_dir: /etc/apt/keyrings
apt_deb822: false

apt_repos_remove: false

apt_update: true
apt_update_cache_valid_time: 3600
apt_upgrade_type: dist

apt_autoremove: true

apt_remove_purge: true

# DNF (RedHat/Fedora/CentOS/Rocky) defaults
dnf_repos_remove: false

dnf_update: true
dnf_upgrade: true

dnf_autoremove: true

# APK (Alpine) defaults
apk_repos_remove: false
apk_repos_backup: true

apk_update: true
apk_upgrade: true
