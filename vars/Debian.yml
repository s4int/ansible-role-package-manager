---

apt_repositories: "{{ q('vars', *q('varnames', '^apt_repositories_.*')) | flatten }}"
apt_packages_remove: "{{ q('vars', *q('varnames', '^apt_packages_remove_.*')) | flatten }}"
apt_packages_conditional: |
  {{ [{'packages': apt_packages|default([])}] +
     q('vars', *q('varnames', '^apt_packages_conditional_.*')) | flatten +
     [{'packages': apt_packages_remove|default([]), 'state': 'absent'}] }}
