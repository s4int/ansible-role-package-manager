---
- name: Fail if molecule group is missing
  hosts: localhost
  tasks:
    - name: Print some info
      ansible.builtin.debug:
        msg: "{{ groups }}"

    - name: Assert group existence
      ansible.builtin.assert:
        that: "'molecule' in groups"
        fail_msg: |
          molecule group was not found inside inventory groups: {{ groups }}

- name: Converge
  hosts: molecule
  gather_facts: true
  pre_tasks:
    - name: Set apk_repositories_host as host fact for Alpine
      vars:
        alpine_version: "{{ ansible_facts['distribution_version'] | regex_replace('^(\\d+\\.\\d+).*', '\\1') }}"
      ansible.builtin.set_fact:
        apk_repos_remove: false
        apk_repos_backup: false
        apk_repositories_host:
          - name: alpine-testing
            url: "https://dl-3.alpinelinux.org/alpine/edge/testing"
      when: ansible_facts['os_family'] == 'Alpine'

  roles:
    - role: s4int.package_manager
