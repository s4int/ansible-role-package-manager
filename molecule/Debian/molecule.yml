---
dependency:
  name: galaxy
  options:
    ignore-certs: false
    ignore-errors: false
    role-file: ../shared/requirements.yml
    requirements-file: ../shared/requirements.yml

lint: set -e ; yamllint . ; ansible-lint

driver:
  name: docker

#    v	Name        Release	     End of support   End of LTS
#    11	bullseye	2021-08-14   2024-08-14       2026-08-31
#    12	bookworm	2023-06-10   2026-06-10       2028-06-30
#    13	trixie	    2025-08-09   2028-08-09       2030-06-30
platforms:
  - name: container-debian-bullseye
    image: python:3.12-bullseye
  - name: container-debian-bookworm
    image: python:3.12-bookworm
  - name: container-debian-trixie
    image: python:3.12-trixie

provisioner:
  name: ansible

  playbooks:
    create: ../shared/create.yml
    converge: converge.yml
    destroy: ../shared/destroy.yml
    side_effect: side_effect.yml
    verify: verify.yml

  lint:
    name: ansible-lint

scenario:
  name: Debian
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - side_effect
    - verify
    - cleanup
    - destroy

verifier:
  name: testinfra
