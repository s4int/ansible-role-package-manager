---
dependency:
  name: galaxy
  options:
    ignore-certs: false
    ignore-errors: false
    role-file: ../shared/requirements.yml
    requirements-file: ../shared/requirements.yml

lint: set -e ; yamllint . ; ansible-lint

driver:
  name: docker

# Version             Code name         Release       End of Support   End of Life
# Debian 11	         bullseye	         2021-08-14    2024-08-14       2026-08-31
# Debian 12	         bookworm	         2023-06-10    2026-06-10       2028-06-30
# Debian 13	         trixie	           2025-08-09    2028-08-09       2030-06-30
# Ubuntu 25.10        Questing Quokka   2025-10-09    2026-07-01       2026-07-01
# Ubuntu 25.04        Plucky Puffin     2025-04-17    2026-01-01       2026-01-01
# Ubuntu 24.04 LTS    Noble Numbat      2024-04-25    2029-06-01       2039-04-01
# Ubuntu 22.04 LTS    Jammy Jellyfish   2022-04-21    2027-06-01       2037-04-01

platforms:
  - name: ${MOLECULE_DISTRO:-container-debian-bullseye}
    image: ${MOLECULE_DISTRO:-geerlingguy/docker-debian11-ansible}
#  - name: container-debian-bookworm
#    image: geerlingguy/docker-debian12-ansible
#  - name: container-debian-trixie
#    image: geerlingguy/docker-debian13-ansible
#  - name: container-ubuntu-24.04
#    image: geerlingguy/docker-ubuntu2404-ansible
#  - name: container-ubuntu-22.04
#    image: geerlingguy/docker-ubuntu2204-ansible

provisioner:
  name: ansible

  playbooks:
    create: ../shared/create.yml
    converge: converge.yml
    destroy: ../shared/destroy.yml
    side_effect: ../shared/side_effect.yml
    verify: verify.yml

  lint:
    name: ansible-lint

scenario:
  name: Debian
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - side_effect
    - verify
    - cleanup
    - destroy

verifier:
  name: testinfra
